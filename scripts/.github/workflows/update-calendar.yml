name: Mise à jour du calendrier et publication du site

on:
  schedule:
    # Tous les jours à 6h00 UTC (8h00 en France)
    - cron: "0 6 * * *"
  workflow_dispatch: {}   # permet aussi de le lancer manuellement depuis l'onglet "Actions"
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Mettre à jour le calendrier (TOP14 + Pro D2)
        run: python3 scripts/update_calendar.py
        
      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: debug-*.png
          if-no-files-found: ignore
          
      - name: Committer le calendrier mis à jour
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add live-calendar.json
          git diff --quiet --cached || git commit -m "Mise à jour automatique du calendrier"
          git push

      - name: Préparer la publication GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

  deploy:
    needs: update-and-deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publier sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
